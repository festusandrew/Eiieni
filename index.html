<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
    <title>Elenii Shepherd — Voice Accessibility Assistant</title>
    
    <!-- Google Fonts: Plus Jakarta Sans for UI and Outfit for titles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
              title: ['"Outfit"', 'system-ui', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      /* Custom scrollbar hiding for clean native mobile UI */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      body {
        background-color: #030303; /* Extra dark pitch-black background */
        color: #f4f4f5; /* zinc-100 */
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      /* Ambient neon aura blur behind the simulator on desktop screens */
      .ambient-glow {
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(45,106,148,0.15) 0%, rgba(99,102,241,0.05) 50%, rgba(0,0,0,0) 100%);
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
        z-index: 0;
      }
    </style>
</head>
  <body class="relative flex items-center justify-center min-h-screen overflow-hidden bg-[#030303]">
    <!-- Ambient desktop aura decoration -->
    <div class="ambient-glow -top-48 -left-48 hidden md:block"></div>
    <div class="ambient-glow -bottom-48 -right-48 hidden md:block"></div>
    
    <div id="root" class="w-full h-full flex items-center justify-center z-10"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
